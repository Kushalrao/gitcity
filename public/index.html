<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>agentview</title>
<script>
  (function () {
    const saved = localStorage.getItem('agentview-theme');
    const dark = saved ? saved === 'dark' : matchMedia('(prefers-color-scheme: dark)').matches;
    if (dark) document.documentElement.classList.add('dark');
  })();
</script>
<style>
  :root {
    --bg: #ffffff;
    --fg: #2b2b2b;
    --dim: #9a9a9a;
    --track: #dcdcdc;
    --panel: rgba(255,255,255,0.92);
    --panel-border: #e2e2e2;
    --hud-bg: rgba(255,255,255,0.85);
    --hud-border: #ececec;
    --label: #8a8a8a;
    --station: #c4c4c4;
    --stlabel: #bbbbbb;
    --bubble-bg: #ffffff;
    --bubble-border: #dddddd;
    --bubble-text: #444444;
    --shadow: rgba(0,0,0,0.08);
    --shadow-hover: rgba(0,0,0,0.15);
  }
  html.dark {
    --bg: #17181c;
    --fg: #e4e4e7;
    --dim: #8b8b93;
    --track: #34363e;
    --panel: rgba(35,37,43,0.92);
    --panel-border: #3a3d46;
    --hud-bg: rgba(35,37,43,0.85);
    --hud-border: #34363e;
    --label: #9a9aa4;
    --station: #4c4f59;
    --stlabel: #6c6f7a;
    --bubble-bg: #24262d;
    --bubble-border: #3a3d46;
    --bubble-text: #d4d4d9;
    --shadow: rgba(0,0,0,0.4);
    --shadow-hover: rgba(0,0,0,0.55);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--fg);
    font: 13px/1.5 -apple-system, "SF Pro Text", "Helvetica Neue", sans-serif;
    height: 100vh; overflow: hidden;
  }
  #mapwrap { width: 100%; height: 100%; overflow: auto; background: var(--bg); cursor: grab; user-select: none; -webkit-user-select: none; }
  #mapwrap.dragging { cursor: grabbing; }
  svg { display: block; }

  #picker {
    position: fixed; left: 14px; top: 14px; z-index: 20;
    display: flex; align-items: flex-start; gap: 8px;
  }
  #pickBtn, .pickOpt {
    width: 54px; height: 54px; border-radius: 50%;
    background: var(--panel); backdrop-filter: blur(4px);
    border: 1px solid var(--panel-border); box-shadow: 0 2px 8px var(--shadow);
    cursor: pointer; padding: 0;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.12s, box-shadow 0.12s;
  }
  #pickBtn:hover, .pickOpt:hover { transform: scale(1.12); box-shadow: 0 3px 12px var(--shadow-hover); }
  .pickOpt.selected { border: 2px solid #FF6319; }
  #pickMenu {
    display: none; flex-wrap: wrap; gap: 8px; max-width: 460px;
    max-height: 74vh; overflow-y: auto;
    background: var(--panel); border: 1px solid var(--panel-border);
    border-radius: 18px; padding: 12px; box-shadow: 0 4px 16px var(--shadow);
    animation: pickin 0.15s ease-out;
  }
  #pickMenu.open { display: flex; }
  @keyframes pickin { from { opacity: 0; transform: translateX(-8px); } }
  .pickOpt { position: relative; }
  .pickOpt .nm {
    position: absolute; top: 56px; left: 50%; transform: translateX(-50%);
    font: 10px ui-monospace, Menlo, monospace; color: var(--label);
    background: var(--panel); padding: 1px 6px; border-radius: 8px;
    opacity: 0; transition: opacity 0.12s; pointer-events: none; white-space: nowrap;
  }
  .pickOpt:hover .nm { opacity: 1; }

  #hud {
    position: fixed; left: 14px; bottom: 12px; z-index: 10;
    display: flex; align-items: center; gap: 8px;
    background: var(--hud-bg); backdrop-filter: blur(4px);
    border: 1px solid var(--hud-border); border-radius: 20px; padding: 5px 14px;
    font: 11px ui-monospace, Menlo, monospace; color: var(--dim);
    pointer-events: none;
  }
  #status { width: 7px; height: 7px; border-radius: 50%; background: #e05252; }
  #status.on { background: #2fbf62; box-shadow: 0 0 6px #2fbf6288; }

  .signtext { font: 700 9px ui-monospace, Menlo, monospace; fill: #F2EFE4; }
  .floorlabel { font: 8.5px ui-monospace, Menlo, monospace; fill: rgba(0,0,0,0.48); transition: fill 0.3s; }
  .floorlabel.night { fill: rgba(255,255,255,0.55); }
  .floorlabel.active { fill: #111; font-weight: 700; }
  html.dark .floorlabel.active { fill: #fff; }
  .floorglow { animation: glowpulse 0.9s ease-in-out infinite; pointer-events: none; }
  @keyframes glowpulse { 0%,100% { opacity: 0.22; } 50% { opacity: 0.48; } }
  .cloud { animation-name: drift; animation-timing-function: ease-in-out; animation-iteration-count: infinite; animation-direction: alternate; }
  @keyframes drift { to { transform: translateX(70px); } }
  .sway { animation: sway 4.5s ease-in-out infinite alternate; transform-box: fill-box; transform-origin: 50% 100%; }
  @keyframes sway { from { transform: rotate(-1.6deg); } to { transform: rotate(2.2deg); } }
  .roam { animation: roam var(--dur, 60s) ease-in-out infinite alternate; animation-delay: var(--delay, 0s); }
  @keyframes roam { from { transform: translate(0, 0); } to { transform: translate(var(--dx, 0px), var(--dy, 0px)); } }

  .agent { transition: opacity 0.3s; }
  /* halo keeps agents readable even when they pass behind a building */
  .agent .sprite-g { filter: drop-shadow(0 1.5px 2px rgba(0,0,0,0.35)) drop-shadow(0 0 4px rgba(255,255,255,0.9)); }
  .agent .bubble-bg { fill: var(--bubble-bg); stroke: var(--bubble-border); filter: drop-shadow(0 2px 5px rgba(0,0,0,0.12)); }
  .agent .bubble-text { font-size: 10.5px; font-family: ui-monospace, Menlo, monospace; fill: var(--bubble-text); }
  .agent .bubble-verb { font-weight: 700; }

  #themeBtn {
    position: fixed; right: 14px; top: 14px; z-index: 20;
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--panel); backdrop-filter: blur(4px);
    border: 1px solid var(--panel-border); box-shadow: 0 2px 8px var(--shadow);
    cursor: pointer; padding: 0;
    font-size: 16px; line-height: 1; color: var(--fg);
    transition: transform 0.12s, box-shadow 0.12s;
  }
  #themeBtn:hover { transform: scale(1.12); box-shadow: 0 3px 12px var(--shadow-hover); }
</style>

/* ---- extended roster: skeletons × palettes ----
   caped humanoid: P = cape (trails behind), E = ears/horns; unmapped letters simply don't draw */
const caped = rows => rows.map((r, i) =>
  r === '...CCCCCC...' ? '..ECCCCCCE..'
  : (i >= 7 && i <= 12 && r[0] === '.') ? 'P' + r.slice(1) : r);
const CAPE = {
  stand: caped(H_STAND), run: [caped(H_RUN1), caped(H_RUN2), caped(H_RUN3)],
  runCycle: [1, 2, 3, 2], work: [caped(H_SIT1), caped(H_SIT2)],
};

/* auto color variants: hue-rotate everything except skin/tool/eyes/whites */
function hexHsl(hex) {
  const n = parseInt(hex.slice(1), 16), r = (n >> 16 & 255) / 255, g = (n >> 8 & 255) / 255, b = (n & 255) / 255;
  const mx = Math.max(r, g, b), mn = Math.min(r, g, b), l = (mx + mn) / 2, d = mx - mn;
  let h = 0, s = 0;
  if (d) {
    s = l > 0.5 ? d / (2 - mx - mn) : d / (mx + mn);
    h = (mx === r ? (g - b) / d + (g < b ? 6 : 0) : mx === g ? (b - r) / d + 2 : (r - g) / d + 4) * 60;
  }
  return [h, s, l];
}
function hslHex(h, s, l) {
  h = ((h % 360) + 360) % 360;
  const f = n => {
    const k = (n + h / 30) % 12, a = s * Math.min(l, 1 - l);
    return Math.round((l - a * Math.max(-1, Math.min(k - 3, 9 - k, 1))) * 255).toString(16).padStart(2, '0');
  };
  return '#' + f(0) + f(8) + f(4);
}
const KEEP_HUE = new Set(['S', 'T', 'K', 'W']);
const shiftAll = (c, deg) => Object.fromEntries(Object.entries(c).map(([k, v]) => {
  if (KEEP_HUE.has(k)) return [k, v];
  const [h, s, l] = hexHsl(v); return [k, hslHex(h + deg, s, l)];
}));
const desatAll = c => Object.fromEntries(Object.entries(c).map(([k, v]) => {
  const [h, s, l] = hexHsl(v); return [k, hslHex(h, s * 0.12, l)];
}));

function el(tag, attrs, parent) {
  const e = document.createElementNS(SVGNS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  if (parent) parent.appendChild(e);
  return e;
}

function buildFrame(parent, rows, colors) {
  const fg = el('g', {}, parent);
  rows.forEach((row, ry) => {
    for (let cx = 0; cx < row.length; cx++) {
      const c = colors[row[cx]];
      if (!c) continue;
      el('rect', {
        x: (cx - 6) * PIXEL, y: (ry - rows.length) * PIXEL,
        width: PIXEL + 0.06, height: PIXEL + 0.06, fill: c,
      }, fg);
    }
  });
  return fg;
}

/* Composite a hat onto a frame: the hat's bottom `drop` rows merge onto the
   head's top rows, the rest stack above (frame grows upward, feet stay put). */
function decorate(rows, hat) {
  const anchor = rows.findIndex(r => r.includes('C'));
  if (anchor < 0) return rows;
  const out = rows.slice();
  const above = hat.rows.length - hat.drop;
  for (let i = 0; i < hat.drop; i++) {
    const hr = hat.rows[above + i], br = out[anchor + i] || '............';
    out[anchor + i] = hr.split('').map((ch, x) => (ch === '.' ? br[x] : ch)).join('');
  }
  out.splice(anchor, 0, ...hat.rows.slice(0, above));
  return out;
}
const frameRows = def => {
  const g = def.grids;
  const all = [g.stand, ...g.run, ...g.work];
  return def.hat ? all.map(r => decorate(r, def.hat)) : all;
};

let svg = null;
let stations = new Map();  // file path -> {streetIso, vx, base, wallFoot, ladderTop, perch, wayDown, glow, wins, label}
let agents = new Map();
let agentLayer = null;
let OX = 0, OY = 0;        // iso origin on the canvas
const isoS = (ix, iy) => ({ x: OX + (ix - iy) * K, y: OY + (ix + iy) * K2 });
let SPAWN = { iso: { x: -1, y: PITCH_Y - S_ISO / 2 }, x: 120, y: 400 };

/* deterministic pseudo-random so the scenery is stable across rebuilds */
const rnd = n => { const x = Math.sin(n * 127.1 + 311.7) * 43758.5453; return x - Math.floor(x); };
const night = () => document.documentElement.classList.contains('dark');
const shade = (hex, sMul, lMul) => { const [h, s, l] = hexHsl(hex); return hslHex(h, Math.min(1, s * sMul), Math.min(1, l * lMul)); };
const P = pts => pts.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');

/* candy-city palette (reference style): saturated walls, pastel roof slabs, teal glass */
const WALLS = ['#2FB0C7', '#F27BAD', '#8F7BE8', '#4FC77B', '#4F7BE8', '#F2A055', '#E86A5A', '#C77BE8', '#E8C13F', '#7BD9E8'];
const ROOFS = ['#F2A0B8', '#A0D9C0', '#C0B8F2', '#F2D9A0', '#A0C4F2', '#F2B8A0', '#B8E8A0', '#E8A0E0'];
const GLASS = '#7BC9DE', GLASS_D = '#3E8FA3';
const SKINS = ['#F8C89A', '#C68642', '#8D5524', '#FFDBAC'];

/* draw an isometric box: roof + the two camera-facing walls */
function isoBox(g, x0, y0, wx, wy, hb, ht, cTop, cLeft, cRight) {
  const A = isoS(x0, y0), B = isoS(x0 + wx, y0), C = isoS(x0 + wx, y0 + wy), D = isoS(x0, y0 + wy);
  const up = (v, h) => ({ x: v.x, y: v.y - h });
  el('polygon', { points: P([up(A, ht), up(B, ht), up(C, ht), up(D, ht)]), fill: cTop }, g);
  el('polygon', { points: P([up(D, ht), up(C, ht), up(C, hb), up(D, hb)]), fill: cLeft }, g);
  el('polygon', { points: P([up(C, ht), up(B, ht), up(B, hb), up(C, hb)]), fill: cRight }, g);
  return { A, B, C, D };
}

/* ---------- the city: every folder a building, every file a floor ---------- */
function flattenDirs(root) {
  const dirs = [];
  (function walk(n) {
    const files = (n.children || []).filter(c => c.type === 'file');
    if (files.length || n.path === '') {
      dirs.push({ key: n.path, name: n.path === '' ? '/' : n.path.split('/').pop(), full: n.path === '' ? '/' : n.path, files });
    }
    for (const d of (n.children || []).filter(c => c.type === 'dir')) walk(d);
  })(root);
  return dirs;
}

function buildMap(root) {
  const dirs = flattenDirs(root);
  const N = night();

  // interleave park lots between top-level blocks
  const items = [];
  let lastTop = null;
  for (const d of dirs) {
    const topKey = d.key === '' ? '/' : d.key.split('/')[0];
    if (lastTop !== null && topKey !== lastTop) items.push({ park: true });
    lastTop = topKey;
    items.push(d);
  }
  const cols = Math.max(3, Math.ceil(Math.sqrt(items.length * 1.4)));
  const rows = Math.max(1, Math.ceil(items.length / cols));
  const maxFloors = Math.max(1, ...dirs.map(d => d.files.length));
  const maxH = LOBBY_HZ + maxFloors * FLOOR_HZ + 70;

  const spanX = cols * PITCH_X, spanY = rows * PITCH_Y;
  OX = (spanY + S_ISO) * K + 160;
  OY = maxH + 160;
  const width = Math.max(OX + (spanX + S_ISO) * K + 160, mapwrap.clientWidth);
  const height = Math.max(OY + (spanX + spanY + 2 * S_ISO) * K2 + 120, mapwrap.clientHeight);

  const oldAgents = [...agents.values()];
  stations = new Map();
  mapwrap.replaceChildren();
  svg = el('svg', { width, height, viewBox: `0 0 ${width} ${height}` });
  mapwrap.appendChild(svg);

  drawGround(width, height, spanX, spanY, cols, rows, N);

  // lots in painter's order: back of the scene first
  const lots = items.map((it, idx) => ({ it, gx: idx % cols, gy: Math.floor(idx / cols) }));
  const colorOf = new Map();
  let ci = 0;
  for (const it of items) if (!it.park) colorOf.set(it, ci++);
  lots.sort((a, b) => (a.gx + a.gy) - (b.gx + b.gy) || a.gx - b.gx);
  for (const { it, gx, gy } of lots) {
    if (it.park) drawParkLot(gx, gy, N);
    else drawBuildingIso(it, colorOf.get(it), gx, gy, N);
  }

  drawWeather(width, height, spanX, spanY, N);

  SPAWN.iso = { x: -1, y: PITCH_Y - S_ISO / 2 };
  const sp = isoS(SPAWN.iso.x, SPAWN.iso.y);
  SPAWN.x = sp.x; SPAWN.y = sp.y;

  agentLayer = el('g', {}, svg);
  for (const a of oldAgents) {
    agentLayer.appendChild(a.g);
    const st = a.lastFile && stations.get(a.lastFile);
    if (st && a.state === 'working') {
      a.x = st.perch.x; a.y = st.perch.y;
      a.aloft = true; a.wayDown = st.wayDown.slice(); a.iso = { ...st.streetIso };
    } else {
      a.iso = a.iso || { ...SPAWN.iso };
      const p = isoS(a.iso.x, a.iso.y);
      a.x = p.x; a.y = p.y; a.aloft = false; a.wayDown = null;
    }
    a.moveTo(a.x, a.y);
  }
}

function drawGround(w, h, spanX, spanY, cols, rows, N) {
  // grass world, paved plaza, street grid
  el('rect', { x: 0, y: 0, width: w, height: h, fill: N ? '#16281E' : '#FAFBEE' }, svg);
  const gx0 = -S_ISO, gx1 = spanX, gy0 = -S_ISO, gy1 = spanY;
  el('polygon', { points: P([isoS(gx0 - 0.6, gy0 - 0.6), isoS(gx1 + 0.6, gy0 - 0.6), isoS(gx1 + 0.6, gy1 + 0.6), isoS(gx0 - 0.6, gy1 + 0.6)]), fill: N ? '#2C3140' : '#C6D3E4' }, svg);

  const asph = N ? '#20242F' : '#8CA3C4';
  const dash = N ? '#7A8296' : '#F5F8FC';
  for (let gy = 0; gy <= rows; gy++) {
    const y0 = gy * PITCH_Y - S_ISO;
    el('polygon', { points: P([isoS(gx0, y0), isoS(gx1, y0), isoS(gx1, y0 + S_ISO), isoS(gx0, y0 + S_ISO)]), fill: asph }, svg);
    const cy = y0 + S_ISO / 2;
    for (let ix = 0; ix < spanX; ix += 1.5) {
      el('polygon', { points: P([isoS(ix, cy - 0.05), isoS(ix + 0.65, cy - 0.05), isoS(ix + 0.65, cy + 0.05), isoS(ix, cy + 0.05)]), fill: dash }, svg);
    }
  }
  for (let gx = 0; gx <= cols; gx++) {
    const x0 = gx * PITCH_X - S_ISO;
    el('polygon', { points: P([isoS(x0, gy0), isoS(x0 + S_ISO, gy0), isoS(x0 + S_ISO, gy1), isoS(x0, gy1)]), fill: asph }, svg);
    const cx = x0 + S_ISO / 2;
    for (let iy = 0; iy < spanY; iy += 1.5) {
      el('polygon', { points: P([isoS(cx - 0.05, iy), isoS(cx + 0.05, iy), isoS(cx + 0.05, iy + 0.65), isoS(cx - 0.05, iy + 0.65)]), fill: dash }, svg);
    }
  }
  // crosswalks + manholes + corner lamps
  const zebra = N ? '#8A93A6' : '#F2EFE4';
  for (let gy = 0; gy <= rows; gy++) {
    for (let gx = 0; gx < cols; gx++) {
      if (rnd(gx * 7 + gy * 13) < 0.45) continue;
      const y0 = gy * PITCH_Y - S_ISO;
      for (let s = 0; s < 4; s++) {
        const x0 = gx * PITCH_X + 0.3 + s * 0.42;
        el('polygon', { points: P([isoS(x0, y0 + 0.18), isoS(x0 + 0.24, y0 + 0.18), isoS(x0 + 0.24, y0 + S_ISO - 0.18), isoS(x0, y0 + S_ISO - 0.18)]), fill: zebra, opacity: 0.9 }, svg);
      }
      if (rnd(gx * 3 + gy * 11 + 5) > 0.7) {
        const m = isoS(gx * PITCH_X + 1.8, y0 + S_ISO / 2 + 0.3);
        el('ellipse', { cx: m.x, cy: m.y, rx: 7, ry: 3.5, fill: N ? '#161A24' : '#575E6B' }, svg);
      }
    }
  }
  for (let gy = 0; gy <= rows; gy++) {
    for (let gx = 0; gx <= cols; gx++) {
      if ((gx + gy) % 2) continue;
      const p = isoS(gx * PITCH_X + 0.12, gy * PITCH_Y + 0.12);
      el('rect', { x: p.x - 2, y: p.y - 50, width: 4, height: 50, fill: '#3A4152' }, svg);
      el('circle', { cx: p.x, cy: p.y - 54, r: 5.5, fill: N ? '#FFE28A' : '#D9DEE8' }, svg);
      if (N) el('circle', { cx: p.x, cy: p.y - 54, r: 15, fill: '#FFE28A', opacity: 0.16 }, svg);
    }
  }
  // traffic lights at some intersections
  for (let gy = 0; gy <= rows; gy++) {
    for (let gx = 0; gx <= cols; gx++) {
      if ((gx + gy) % 3 !== 1) continue;
      const p = isoS(gx * PITCH_X - S_ISO - 0.12, gy * PITCH_Y + 0.12);
      el('rect', { x: p.x - 1.5, y: p.y - 44, width: 3, height: 44, fill: '#3A4152' }, svg);
      el('rect', { x: p.x - 4, y: p.y - 58, width: 8, height: 16, rx: 2.5, fill: '#2B2F3A' }, svg);
      el('circle', { cx: p.x, cy: p.y - 54, r: 1.8, fill: '#E05252' }, svg);
      el('circle', { cx: p.x, cy: p.y - 49.5, r: 1.8, fill: '#F2C21F' }, svg);
      el('circle', { cx: p.x, cy: p.y - 45, r: 1.8, fill: N ? '#5AE07A' : '#2FA84F' }, svg);
    }
  }
  // sidewalk trees on the block corners
  for (let gy = 0; gy <= rows; gy++) {
    for (let gx = 0; gx <= cols; gx++) {
      if (rnd(gx * 19 + gy * 23) < 0.55) continue;
      const kinds = ['round', 'tall', 'palm'];
      drawTreeAt(isoS(gx * PITCH_X + 0.35, gy * PITCH_Y + 0.35), 0.6 + rnd(gx + gy) * 0.35, N, kinds[Math.floor(rnd(gx * 3 + gy * 7) * 3)]);
    }
  }
  // cars cruising the streets
  const nCars = Math.round(cols * rows * 0.9) + 3;
  for (let i = 0; i < nCars; i++) {
    const col = WALLS[Math.floor(rnd(i + 13) * WALLS.length)];
    if (rnd(i) > 0.5) {
      const gy = Math.floor(rnd(i + 31) * (rows + 1));
      drawCarIso(1 + rnd(i + 7) * (spanX - 3), gy * PITCH_Y - S_ISO / 2 - 0.28, 'x', col, N, i * 3 + 1);
    } else {
      const gx = Math.floor(rnd(i + 47) * (cols + 1));
      drawCarIso(gx * PITCH_X - S_ISO / 2 + 0.28, 1 + rnd(i + 9) * (spanY - 3), 'y', col, N, i * 5 + 2);
    }
  }
  // pedestrians strolling the sidewalks
  const nPeds = Math.round(cols * rows * 1.3) + 6;
  for (let i = 0; i < nPeds; i++) {
    if (rnd(i + 1) > 0.5) {
      const gy = Math.floor(rnd(i + 61) * (rows + 1));
      drawPedestrian(1 + rnd(i + 17) * (spanX - 3), gy * PITCH_Y - S_ISO - 0.22, 'x', i * 7 + 3, N);
    } else {
      const gx = Math.floor(rnd(i + 71) * (cols + 1));
      drawPedestrian(gx * PITCH_X - S_ISO - 0.22, 1 + rnd(i + 19) * (spanY - 3), 'y', i * 11 + 5, N);
    }
  }
}

function drawCarIso(ix, iy, axis, col, N, seed) {
  const wx = axis === 'x' ? 1.25 : 0.6, wy = axis === 'x' ? 0.6 : 1.25;
  const body = N ? shade(col, 0.85, 0.5) : col;
  const dark = shade(body, 1, 0.7), darker = shade(body, 1, 0.55);
  // cars cruise slowly up and down their street
  const u = (4 + rnd(seed + 3) * 7) * (rnd(seed + 8) > 0.5 ? 1 : -1);
  const dx = axis === 'x' ? u * K : -u * K, dy = u * K2;
  const g = el('g', {
    class: 'roam',
    style: `--dx:${dx.toFixed(0)}px; --dy:${dy.toFixed(0)}px; --dur:${(30 + rnd(seed) * 40).toFixed(0)}s; --delay:-${(rnd(seed + 5) * 30).toFixed(0)}s`,
  }, svg);
  const c = isoS(ix + wx / 2, iy + wy / 2);
  el('ellipse', { cx: c.x, cy: c.y + 3, rx: (wx + wy) * 14, ry: (wx + wy) * 6, fill: '#2B3345', opacity: 0.18 }, g);
  isoBox(g, ix, iy, wx, wy, 2, 13, body, dark, darker);
  const inx = axis === 'x' ? 0.28 : 0.1, iny = axis === 'x' ? 0.1 : 0.28;
  isoBox(g, ix + inx, iy + iny, wx - 2 * inx, wy - 2 * iny, 13, 22, shade(body, 1, 1.12), N ? '#FFE9AE' : '#CFE8F7', N ? '#E8CE8E' : '#AFCFE4');
  if (N) {
    const f = isoS(ix + (axis === 'x' ? wx : wx / 2), iy + (axis === 'x' ? wy / 2 : wy));
    el('circle', { cx: f.x, cy: f.y - 6, r: 8, fill: '#FFE9AE', opacity: 0.25 }, g);
  }
}

function drawPedestrian(ix, iy, axis, seed, N) {
  const p = isoS(ix, iy);
  const u = (1.5 + rnd(seed) * 4) * (rnd(seed + 4) > 0.5 ? 1 : -1);
  const dx = axis === 'x' ? u * K : -u * K, dy = u * K2;
  const g = el('g', {
    class: 'roam',
    style: `--dx:${dx.toFixed(0)}px; --dy:${dy.toFixed(0)}px; --dur:${(35 + rnd(seed + 2) * 45).toFixed(0)}s; --delay:-${(rnd(seed + 6) * 35).toFixed(0)}s`,
  }, svg);
  const outfit = WALLS[Math.floor(rnd(seed + 9) * WALLS.length)];
  const skin = SKINS[Math.floor(rnd(seed + 11) * SKINS.length)];
  el('ellipse', { cx: p.x, cy: p.y + 1.5, rx: 4.5, ry: 2, fill: '#2B3345', opacity: 0.2 }, g);
  el('rect', { x: p.x - 2.6, y: p.y - 11, width: 5.2, height: 9, rx: 2.4, fill: N ? shade(outfit, 0.9, 0.6) : outfit }, g);
  el('circle', { cx: p.x, cy: p.y - 13.5, r: 2.8, fill: skin }, g);
}

function drawTreeAt(p, s, N, kind) {
  const g = el('g', { transform: `translate(${p.x} ${p.y}) scale(${s})` }, svg);
  el('ellipse', { cx: 4, cy: 3, rx: 26, ry: 10, fill: '#2B3345', opacity: 0.15 }, g);
  const leaf = N ? '#2E4A3C' : '#63B04E', leaf2 = N ? '#3A5C4A' : '#8FCB6B', leaf3 = N ? '#28422F' : '#3E8A52';
  const canopy = el('g', { class: 'sway', style: `animation-delay:-${(p.x % 7).toFixed(1)}s` }, g);
  if (kind === 'palm') {
    el('path', { d: 'M -2 0 C -4 -22 2 -40 6 -56', stroke: N ? '#4A3A2E' : '#8B6142', 'stroke-width': 6, fill: 'none', 'stroke-linecap': 'round' }, g);
    for (const [rx, ry, ang] of [[22, 8, -30], [22, 8, 25], [18, 7, -70], [18, 7, 70], [20, 7, 0]]) {
      el('ellipse', { cx: 6, cy: -58, rx, ry, fill: leaf3, transform: `rotate(${ang} 6 -58)` }, canopy);
    }
  } else if (kind === 'tall') {

}

function drawBuildingIso(b, i, gx, gy, N) {

  // face helpers: point at fraction t along a wall, elevated h px

  // rooftop life: water tower / roof garden / AC + antenna

  if (r > 0.6) {
    const t = isoBox(g, bx + W_ISO - 1.3, by + 0.4, 0.85, 0.85, H + 6, H + 30, N ? '#3A2E24' : '#8B6142', N ? '#4A3A2E' : '#A8795A', N ? '#3E3026' : '#96684A');

    const t1 = isoS(bx + 0.9, by + 0.9), t2 = isoS(bx + 1.5, by + 1.1);
    el('circle', { cx: t1.x, cy: t1.y - H - 8, r: 8, fill: N ? '#2E4A3C' : '#9CCB6B' }, g);

    const ap = isoS(bx + 0.5, by + 0.5);

  // roof sign with the folder name + giant painted initial

  // ladder up the front wall
  const lf = PF(0.15, 0);
  const lcol = N ? '#5A6273' : '#4E5560';
  el('rect', { x: lf.x - 5, y: lf.y - H + 6, width: 2.4, height: H - 6, fill: lcol }, g);
  el('rect', { x: lf.x + 3, y: lf.y - H + 6, width: 2.4, height: H - 6, fill: lcol }, g);
  for (let ry = lf.y - 6; ry > lf.y - H + 8; ry -= 8) {
    el('rect', { x: lf.x - 5, y: ry, width: 10.4, height: 2, fill: lcol }, g);

}

function drawFloorIso(g, bi, fi, f, PF, PR, ctx, N) {
  const hb = LOBBY_HZ + fi * FLOOR_HZ, ht = hb + FLOOR_HZ;
  const wins = [];
  // vertical glass strips across the facade, reference style
  for (let wi = 0; wi < 4; wi++) {
    const t0 = 0.06 + wi * 0.135, t1 = t0 + 0.085;
    const lit = N && rnd(bi * 131 + fi * 17 + wi * 7) > 0.55;
    wins.push(el('polygon', {
      points: P([PF(t0, ht - 2.5), PF(t1, ht - 2.5), PF(t1, hb + 2.5), PF(t0, hb + 2.5)]),
      fill: lit ? '#FFD98A' : (N ? '#25314A' : GLASS),
      stroke: lit ? 'none' : GLASS_D, 'stroke-width': 0.8,
    }, g));
  }
  for (const [si, [t0, t1]] of [[0, [0.18, 0.32]], [1, [0.44, 0.58]]].entries()) {
    const litR = N && rnd(bi * 131 + fi * 17 + 91 + si * 5) > 0.6;
    wins.push(el('polygon', {
      points: P([PR(t0, ht - 3), PR(t1, ht - 3), PR(t1, hb + 3), PR(t0, hb + 3)]),
      fill: litR ? '#EDC372' : (N ? '#1D2740' : shade(GLASS, 1, 0.72)),
    }, g));
  }

  const lp = PF(0.69, hb + FLOOR_HZ / 2 - 4);
  const label = el('text', {
    class: 'floorlabel' + (N ? ' night' : ''), x: lp.x, y: lp.y,
    'text-anchor': 'middle', transform: `rotate(26.57 ${lp.x} ${lp.y})`,
  }, g);
  label.textContent = f.name.length > 11 ? f.name.slice(0, 10) + '…' : f.name;
  el('title', {}, label).textContent = f.path;

  const glow = el('polygon', {
    class: 'floorglow',
    points: P([PF(0.02, ht - 1), PF(0.98, ht - 1), PF(0.98, hb + 1), PF(0.02, hb + 1)]),
    fill: '#FFD98A', visibility: 'hidden',
  }, g);

  const wf = PF(0.15, 0);
  const ladderTop = { x: wf.x, y: wf.y - hb - 2 };
  const pp = PF(0.46, hb);
  const perch = { x: pp.x, y: pp.y - 2 };
  return {
    streetIso: ctx.streetIso, vx: ctx.vx, base: ctx.base,
    wallFoot: wf, ladderTop, perch,
    wayDown: [ladderTop, wf, ctx.base],
    glow, wins, label,
  };
}

/* ---------- routing: Manhattan on the street grid, then up the ladder ---------- */
function dedupe(pts) {
  return pts.filter((p, j) => j === 0 || Math.hypot(p.x - pts[j-1].x, p.y - pts[j-1].y) > 0.5);
}
function streetRoute(fromIso, toIso, vx) {
  const pts = [];
  if (Math.abs(fromIso.y - toIso.y) > 0.05) {
    pts.push(isoS(vx, fromIso.y), isoS(vx, toIso.y));   // turn down a cross street
  }
  pts.push(isoS(toIso.x, toIso.y));
  return pts;
}
function routeVia(a, st) {
  const pts = [{ x: a.x, y: a.y }];
  if (a.aloft && a.wayDown) pts.push(...a.wayDown);      // ledge → ladder → street
  pts.push(...streetRoute(a.iso || SPAWN.iso, st.streetIso, st.vx));
  pts.push(st.wallFoot, st.ladderTop, st.perch);
  a.iso = { ...st.streetIso };
  return dedupe(pts);
}
function routeGround(a, toIso) {
  const pts = [{ x: a.x, y: a.y }];
  if (a.aloft && a.wayDown) pts.push(...a.wayDown);
  pts.push(...streetRoute(a.iso || SPAWN.iso, toIso, toIso.x));
  a.iso = { ...toIso };
  return dedupe(pts);
}

/* ---------- agents ---------- */
function rebuildSprite(a) {
  const def = CHARACTERS[charKey];
  const patch = a.id === 'fs-watcher' ? def.gray : def.variants[a.variantIdx % def.variants.length];
  const colors = { ...def.colors, ...patch };
  const grids = def.grids;
  a.pose.replaceChildren();
  a.frames = frameRows(def).map(rows => buildFrame(a.pose, rows, colors));
  a.runCycle = grids.runCycle;
  a.workBase = 1 + grids.run.length;
  a.workCount = grids.work.length;
  a.frame = -1;
  a.setFrame(a.state === 'working' ? a.workBase : 0);
  // lift the speech bubble above tall headgear
  const added = def.hat ? def.hat.rows.length - def.hat.drop : 0;
  const baseY = (a.isKid ? -58 : -84) - added * PIXEL * (a.isKid ? KID_SCALE : 1);
  a.bubbleBg.setAttribute('y', baseY);
  a.bubbleText.setAttribute('y', baseY + 15);
}

function makeAgent(id) {
  const isKid = id === 'fs-watcher' || mainId !== null;
  if (!isKid) mainId = id;
  const scale = isKid ? KID_SCALE : 1;

  const g = el('g', { class: 'agent' }, agentLayer);
  // ground marker so the agent stays findable behind buildings
  el('ellipse', {
    cx: 0, cy: 3, rx: isKid ? 8 : 12, ry: isKid ? 3.2 : 4.6,
    fill: '#FFFFFF', opacity: 0.35, stroke: '#FF6319', 'stroke-width': 1.5, 'stroke-opacity': 0.55,
  }, g);
  const spriteG = el('g', { class: 'sprite-g', transform: `scale(${scale})` }, g);
  const flip = el('g', {}, spriteG);
  const pose = el('g', {}, flip);

  const bubbleY = isKid ? -58 : -84;
  const bubble = el('g', { visibility: 'hidden' }, g);
  const bubbleBg = el('rect', { class: 'bubble-bg', y: bubbleY, height: 22, rx: 11 }, bubble);
  const bubbleText = el('text', { class: 'bubble-text', y: bubbleY + 15 }, bubble);

  // main walks in from the edge of town; kids pop out at street level below the main agent
  const main = mainId && agents.get(mainId);
  let iso0 = { ...SPAWN.iso }, sx = SPAWN.x, sy = SPAWN.y;
  if (isKid && main) {
    iso0 = { ...(main.iso || SPAWN.iso) };
    const p = isoS(iso0.x, iso0.y);
    sx = p.x; sy = p.y;
  }

  const a = {
    id, g, bubble, bubbleBg, bubbleText, flip, pose, isKid,
    frames: [], runCycle: [0], workBase: 1, workCount: 1,
    variantIdx: isKid ? 1 + spriteIdx++ : 0,
    x: sx, y: sy, lastFile: null,
    iso: iso0, aloft: false, wayDown: null,
    state: 'idle', queue: [], path: [], seg: 0, segT: 0,
    remaining: 0, vel: 0, animT: 0, workT: 0, frame: -1,
    dwellUntil: 0, lastActive: performance.now(), returning: false,
    gait: isKid ? 1.35 : 1,   // kids scurry
    moveTo(x, y) { this.x = x; this.y = y; g.setAttribute('transform', `translate(${x} ${y})`); },
    setFrame(i) {
      if (i === this.frame) return;
      this.frame = i;
      this.frames.forEach((f, j) => f.setAttribute('visibility', j === i ? 'visible' : 'hidden'));
    },
    face(dir) { flip.setAttribute('transform', dir < 0 ? 'scale(-1 1)' : 'scale(1 1)'); },
    setPose(lean, bob) {
      pose.setAttribute('transform', `translate(0 ${bob.toFixed(2)}) rotate(${lean.toFixed(2)} 0 -34)`);
    },
    say(verbText, verbClass, file) {
      bubbleText.replaceChildren();
      const v = el('tspan', { class: 'bubble-verb', fill: VERB_COLOR[verbClass] }, bubbleText);
      v.textContent = verbText + ' ';
      const f = el('tspan', {}, bubbleText);
      f.textContent = file.split('/').pop();
      const w = bubbleText.getComputedTextLength() + 20;
      bubbleBg.setAttribute('x', -w / 2); bubbleBg.setAttribute('width', w);
      bubbleText.setAttribute('x', -w / 2 + 10);
      bubble.setAttribute('visibility', 'visible');
      clearTimeout(this.sayTimer);
      this.sayTimer = setTimeout(() => bubble.setAttribute('visibility', 'hidden'), 3000);
    },
  };
  rebuildSprite(a);
  a.moveTo(sx, sy);
  agents.set(id, a);
  return a;
}

function getAgent(id) { return agents.get(id) || makeAgent(id); }

function pathLength(pts) {
  let d = 0;
  for (let i = 1; i < pts.length; i++) d += Math.hypot(pts[i].x - pts[i-1].x, pts[i].y - pts[i-1].y);
  return d;
}

function beginPath(a, pts) {
  a.path = pts;
  a.seg = 0; a.segT = 0;
  a.remaining = pathLength(pts);
  a.vel = Math.max(a.vel, 20);
  a.state = 'moving';
  a.aloft = false;       // any planned path already includes the climb down
  a.wayDown = null;
}

function startNext(a) {
  const job = a.queue.shift();
  if (!job) return;
  const st = stations.get(job.file);
  if (!st) { scheduleRefresh(); return; }
  a.job = job;
  a.returning = false;
  beginPath(a, routeVia(a, st));
  ensureVisible(st.perch.x, st.perch.y);
}

/* Sub-agent finished — run back through the streets to the main agent and vanish. */
function startReturn(a) {
  const main = mainId && agents.get(mainId);
  a.returning = true;
  a.job = null;
  beginPath(a, routeGround(a, main && main.iso ? main.iso : SPAWN.iso));
}

function despawn(a) {
  a.g.style.opacity = '0';
  setTimeout(() => a.g.remove(), 350);
  agents.delete(a.id);
}

function arrive(a) {
  if (a.returning) { despawn(a); return; }
  const job = a.job;
  const st = stations.get(job.file);
  a.state = 'working';
  a.dwellUntil = performance.now() + DWELL;
  a.lastFile = job.file;
  a.lastActive = performance.now();
  a.vel = 0;
  a.workT = 0;
  a.setFrame(a.workBase);   // sit down, bring out the tool
  a.setPose(0, 0);
  a.say(job.verbText, job.verbClass, job.file);

  if (st) {
    a.aloft = true;
    a.wayDown = st.wayDown.slice();
    a.face(1);
    st.glow.setAttribute('visibility', 'visible');
    st.wins.forEach(wn => wn.setAttribute('fill', '#FFD98A'));   // the floor lights up
    st.label.classList.add('active');
    clearTimeout(st.glowTimer);
    st.glowTimer = setTimeout(() => {
      st.glow.setAttribute('visibility', 'hidden');
      st.label.classList.remove('active');
    }, DWELL + 300);
  }
}

/* ---------- animation loop ---------- */
let lastTs = performance.now();
function tick(ts) {
  const dt = Math.min(0.05, (ts - lastTs) / 1000);
  lastTs = ts;
  for (const a of [...agents.values()]) {
    if (a.state === 'moving') {
      const s0 = a.path[a.seg], s1 = a.path[Math.min(a.seg + 1, a.path.length - 1)];
      const onLadder = Math.abs(s1.x - s0.x) < 0.5 && Math.abs(s1.y - s0.y) > 0.5;
      const cruise = SPEED * (onLadder ? 0.55 : 1) * (a.queue.length > 2 ? HURRY : 1);
      const brake = Math.sqrt(2 * ACCEL * Math.max(0, a.remaining));
      a.vel = Math.min(a.vel + ACCEL * dt, cruise, Math.max(brake, 26));
      let step = a.vel * dt;
      a.remaining = Math.max(0, a.remaining - step);

      while (step > 0 && a.seg < a.path.length - 1) {
        const p0 = a.path[a.seg], p1 = a.path[a.seg + 1];
        const segLen = Math.hypot(p1.x - p0.x, p1.y - p0.y);
        const remain = segLen * (1 - a.segT);
        if (step < remain) { a.segT += step / segLen; step = 0; }
        else { step -= remain; a.seg++; a.segT = 0; }
      }

      if (a.seg >= a.path.length - 1) {
        const end = a.path[a.path.length - 1];
        a.moveTo(end.x, end.y);
        a.setFrame(0);
        a.setPose(0, 0);
        arrive(a);
      } else {
        const p0 = a.path[a.seg], p1 = a.path[a.seg + 1];
        const vertical = Math.abs(p1.x - p0.x) < 0.5;
        const rate = (a.vel / SPEED) * a.gait;
        a.animT += dt * rate * (vertical ? 0.7 : 1);
        a.setFrame(a.runCycle[Math.floor(a.animT * RUN_FPS) % a.runCycle.length]);
        if (vertical) {
          a.face(1);            // climbing the ladder: upright, hands-and-feet cadence
          a.setPose(0, 0);
        } else {
          const dir = Math.sign(p1.x - p0.x);
          if (dir) a.face(dir);
          const lean = 8 * Math.min(1, a.vel / SPEED);
          const bob = -Math.abs(Math.sin(a.animT * RUN_FPS * Math.PI / 2)) * 4.4;
          a.setPose(lean, bob);
        }
        a.moveTo(p0.x + (p1.x - p0.x) * a.segT, p0.y + (p1.y - p0.y) * a.segT);
      }
    } else if (a.state === 'working') {
      a.workT += dt;
      a.setFrame(a.workBase + Math.floor(a.workT * WORK_FPS) % a.workCount);
      if (performance.now() > a.dwellUntil) {
        a.state = 'idle';
        a.setFrame(0);
        if (a.queue.length) startNext(a);
      }
    } else if (a.state === 'idle') {
      if (a.queue.length) startNext(a);
      else if (a.isKid && performance.now() - a.lastActive > KID_LINGER) startReturn(a);
    }
  }
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

function ensureVisible(x, y) {
  const pad = 80;
  const { scrollLeft, scrollTop, clientWidth, clientHeight } = mapwrap;
  let sx = scrollLeft, sy = scrollTop;
  if (x < scrollLeft + pad || x > scrollLeft + clientWidth - pad) sx = x - clientWidth / 2;
  if (y < scrollTop + pad || y > scrollTop + clientHeight - pad) sy = y - clientHeight / 2;
  if (sx !== scrollLeft || sy !== scrollTop) mapwrap.scrollTo({ left: sx, top: sy, behavior: 'smooth' });
}

/* ---------- event stream ---------- */
async function handleActivity(ev) {
  const [verbText, verbClass] = VERBS[ev.tool] || ['touching', 'edit'];
  if (ev.external) return;

  if (!stations.has(ev.file)) await refreshMap();
  if (!stations.has(ev.file)) return;

  const a = getAgent(ev.agent);
  a.lastActive = performance.now();
  const last = a.queue[a.queue.length - 1];
  if (last && last.file === ev.file) { last.verbText = verbText; last.verbClass = verbClass; return; }
  a.queue.push({ file: ev.file, verbText, verbClass });
  if (a.queue.length > 6) a.queue.shift();
}

function connect() {
  const es = new EventSource('/events');
  es.onopen = () => statusEl.classList.add('on');
  es.onerror = () => statusEl.classList.remove('on');
  es.onmessage = (m) => {
    const ev = JSON.parse(m.data);
    if (ev.type === 'hello') { document.getElementById('watchdir').textContent = ev.watchDir; return; }
    if (ev.type === 'rewatch') { location.reload(); return; }
    if (ev.type !== 'activity' || !ev.file) return;
    handleActivity(ev);
  };
}

/* ---------- character picker ---------- */
function miniSprite(def) {
  const s = el('svg', { width: 38, height: 48, viewBox: '-27 -88 54 92' });
  const stand = def.hat ? decorate(def.grids.stand, def.hat) : def.grids.stand;
  buildFrame(el('g', {}, s), stand, def.colors);
  return s;
}
function applyCharacter(key) {
  charKey = key;
  localStorage.setItem('agentview-char', key);
  pickBtn.replaceChildren(miniSprite(CHARACTERS[key]));
  document.querySelectorAll('.pickOpt').forEach(b => b.classList.toggle('selected', b.dataset.key === key));
  for (const a of agents.values()) rebuildSprite(a);
}
const pickBtn = document.getElementById('pickBtn');
const pickMenu = document.getElementById('pickMenu');
for (const [key, def] of Object.entries(CHARACTERS)) {
  const b = document.createElement('button');
  b.className = 'pickOpt' + (key === charKey ? ' selected' : '');
  b.dataset.key = key;
  b.appendChild(miniSprite(def));
  const nm = document.createElement('span');
  nm.className = 'nm';
  nm.textContent = def.name;
  b.appendChild(nm);
  b.onclick = () => { applyCharacter(key); pickMenu.classList.remove('open'); };
  pickMenu.appendChild(b);
}
pickBtn.replaceChildren(miniSprite(CHARACTERS[charKey]));
pickBtn.onclick = () => pickMenu.classList.toggle('open');

/* ---------- drag to pan around the city ---------- */
let dragPan = null;
mapwrap.addEventListener('pointerdown', (e) => {
  dragPan = { x: e.clientX, y: e.clientY, sl: mapwrap.scrollLeft, st: mapwrap.scrollTop };
  mapwrap.classList.add('dragging');
});
window.addEventListener('pointermove', (e) => {
  if (!dragPan) return;
  mapwrap.scrollLeft = dragPan.sl - (e.clientX - dragPan.x);
  mapwrap.scrollTop = dragPan.st - (e.clientY - dragPan.y);
});
window.addEventListener('pointerup', () => { dragPan = null; mapwrap.classList.remove('dragging'); });

/* ---------- dark mode ---------- */
const themeBtn = document.getElementById('themeBtn');
function setDark(dark) {
  document.documentElement.classList.toggle('dark', dark);
  themeBtn.textContent = dark ? '☀' : '☾';
  if (svg) refreshMap();   // repaint the city: day ↔ night
}
themeBtn.textContent = document.documentElement.classList.contains('dark') ? '☀' : '☾';
themeBtn.onclick = () => {
  const dark = !document.documentElement.classList.contains('dark');
  localStorage.setItem('agentview-theme', dark ? 'dark' : 'light');
  setDark(dark);
};
matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (m) => {
  if (!localStorage.getItem('agentview-theme')) setDark(m.matches);
});

refreshMap().then(() => {
  mapwrap.scrollTo({
    left: SPAWN.x - mapwrap.clientWidth / 3,
    top: SPAWN.y - mapwrap.clientHeight / 2,
  });
  connect();
});
</script>
